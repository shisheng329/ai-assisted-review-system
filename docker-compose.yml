services:
  app:
    image: 20260425-system-demo-git:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
    container_name: 20260423-system-demo
    environment:
      APP_NAME: 20260423-system-demo
      DATABASE_PATH: /app/data/app.db
      DEFAULT_LANGUAGE: zh-CN
      STREAMLIT_SERVER_PORT: 8502
      STREAMLIT_SERVER_RUN_ON_SAVE: "true"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: poll
    ports:
      - "8503:8501"
    volumes:
      - ./:/app
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8501/health | grep -q ok"]
      interval: 20s
      timeout: 5s
      retries: 5
